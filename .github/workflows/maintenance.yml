name: Maintenance

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday 03:00 UTC
  workflow_dispatch:

jobs:
  prune-used-clips:
    runs-on: ubuntu-latest
    concurrency:
      group: bot-tiktok-pipeline
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Prepare Firebase service account
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > firebase_service_account.json

      - name: Run prune used_clips
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python scripts/prune_used_clips.py --days 90

      - name: Commit data files (safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/git_safe_commit.sh || true
          scripts/git_safe_commit.sh "chore: prune used_clips [auto]"
