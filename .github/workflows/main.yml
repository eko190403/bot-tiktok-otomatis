name: Bot TikTok Auto-Pilot

on:
  # Ganti gerbang masuk menjadi Issue Comment
  issue_comment:
    types: [created]
  workflow_dispatch: 
  schedule:
    - cron: '0 9 * * *' 

jobs:
  build-and-run:
    # Keamanan tambahan: pastikan workflow hanya jalan jika trigger berasal dari bot kamu
    if: contains(github.event.comment.body, '/generate') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repositori
      uses: actions/checkout@v4

    - name: Atur Lingkungan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instal System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        mkdir -p assets/fonts temp output

    - name: Instal Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Eksekusi Bot Utama
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
        GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
        GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
        GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
      run: |
        python app.py

    - name: Unggah Hasil Video
      uses: actions/upload-artifact@v4
      with:
        name: video-tiktok-fakta
        path: output/final_output.mp4
        retention-days: 7
