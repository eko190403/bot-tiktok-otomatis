name: Run TikTok Bot Auto-Pilot

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ImageMagick dan Font Kebal
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        # Mengubah kebijakan ImageMagick agar mengizinkan konversi teks/font tanpa diblokir
        sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
        sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml

    - name: Install Dependencies Aman
      run: |
        python -m pip install --upgrade pip
        pip install google-genai edge-tts numpy requests playwright
        pip install "pillow<10.0.0"
        pip install "moviepy<2.0.0"
        playwright install chromium

    - name: Eksekusi Bot Utama
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      run: |
        python app.py

    - name: Upload Hasil Video ke GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiktok-video-hasil-render
        path: final_output.mp4
        retention-days: 1
