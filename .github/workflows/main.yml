name: Bot TikTok Auto-Pilot

on:
  workflow_dispatch: # Memungkinkan kamu menjalankan bot secara manual dari tab Actions
  schedule:
    - cron: '0 9 * * *' # Otomatis berjalan setiap hari jam 09:00 UTC (jam 16:00 WIB)

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Batalkan Alur Kerja yang Sedang Berjalan
      uses: styfle/cancel-workflow-action@0.11.0
      with:
        access_token: ${{ github.token }}

    - name: Checkout Repositori
      uses: actions/checkout@v4

    - name: Atur Lingkungan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instal System Dependencies (FFmpeg & Fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-noto-color-emoji
        # Pastikan folder fonts lokal ada jika diperlukan oleh config
        mkdir -p assets/fonts

    - name: Instal Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Eksekusi Bot Utama
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
