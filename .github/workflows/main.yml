name: Bot TikTok Auto-Pilot

on:
  workflow_dispatch:

  repository_dispatch:
    types:
      - run-bot
      - telegram_trigger
      - webhook_trigger
      - telegram_publish

  schedule:
    # Menggunakan Jam Emas (Prime Time) Indonesia agar jangkauan penonton maksimal:
    # 08:00 WIB (01:00 UTC), 12:00 WIB (05:00 UTC), 15:00 WIB (08:00 UTC), 17:30 WIB (10:30 UTC), 19:30 WIB (12:30 UTC), 21:00 WIB (14:00 UTC)
    - cron: '0 1,5,8,14 * * *'
    - cron: '30 10,12 * * *'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Bersihkan Workspace
        run: |
          rm -rf temp/*
          rm -rf output/*
          mkdir -p temp output assets/fonts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg dan ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          
          # Membuka izin akses ImageMagick agar MoviePy bisa merender teks/subtitle secara universal
          sudo find /etc/ImageMagick* -name "policy.xml" -exec sed -i 's/domain="path" rights="none"/domain="path" rights="read|write"/' {} + || true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Playwright Chromium & System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      # === LANGKAH BARU: NOTIFIKASI MULAI ===
      - name: Kirim Notifikasi Proses Dimulai ke Telegram
        if: github.event.action != 'telegram_publish'
        run: |
          curl -v -X POST "https://api.telegram.org/bot8644685615:AAERnJkiFVLR0HhFxmj5HTFmYhsmtytso1A/sendMessage" \
            -d "chat_id=1120755820" \
            -d "text= Perintah diterima! Video Ruang Pikir sedang mulai diproses dan dirender di Cloud. Mohon tunggu sekitar 2-5 menit..."

      - name: Siapkan Cookies TikTok dari Secret
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          if [ -n "$TIKTOK_COOKIES" ]; then
            echo " Menulis berkas cookies.json secara dinamis dari GitHub Secrets..."
            echo "$TIKTOK_COOKIES" > cookies.json
          else
            echo " Secret TIKTOK_COOKIES tidak diset. Menggunakan berkas cookies.json bawaan dari repositori."
          fi

      - name: Siapkan Kredensial YouTube dari Secret
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          if [ -n "$YOUTUBE_CREDENTIALS" ]; then
            echo " Menulis berkas youtube_credentials.json secara dinamis dari GitHub Secrets..."
            echo "$YOUTUBE_CREDENTIALS" > youtube_credentials.json
          else
            echo " Secret YOUTUBE_CREDENTIALS tidak diset. Menggunakan berkas youtube_credentials.json bawaan dari repositori."
          fi

      - name: Siapkan Akun Layanan Firebase dari Secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo " Menulis berkas firebase_service_account.json secara dinamis dari GitHub Secrets..."
            echo "$FIREBASE_SERVICE_ACCOUNT" > firebase_service_account.json
          else
            echo " Secret FIREBASE_SERVICE_ACCOUNT tidak diset. Menggunakan fallback database lokal."
          fi

      - name: Jalankan Bot
        if: github.event.action != 'telegram_publish'
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENABLE_TIKTOK_UPLOAD: "false"
          ENABLE_YOUTUBE_UPLOAD: "false"
          TELEGRAM_BOT_TOKEN: "8644685615:AAERnJkiFVLR0HhFxmj5HTFmYhsmtytso1A"
          TELEGRAM_CHAT_ID: "1120755820"
        run: |
          python app.py

      - name: Jalankan Remote Control Publisher (Kirim ke Medsos)
        if: github.event.action == 'telegram_publish'
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: "8644685615:AAERnJkiFVLR0HhFxmj5HTFmYhsmtytso1A"
          TELEGRAM_CHAT_ID: "1120755820"
        run: |
          python remote_publisher.py \
            --video_id "${{ github.event.client_payload.video_id }}" \
            --platform "${{ github.event.client_payload.platform }}" \
            --chat_id "${{ github.event.client_payload.chat_id }}"

      - name: Lihat Hasil Output
        if: always()
        run: |
          echo "Isi folder output:"
          ls -lah output || true

      - name: Kirim Hasil Video ke Telegram Bot
        if: success() && github.event.action != 'telegram_publish'
        run: |
          VIDEO_FILE=$(ls output/*.mp4 | head -n 1)
          
          if [ -z "$VIDEO_FILE" ]; then
            echo " Eror: Tidak ada file video .mp4 di folder output!"
            exit 1
          fi
        
          echo " Mengirim $VIDEO_FILE ke Telegram..."
          
          curl -v -F video="@${VIDEO_FILE}" \
            -F caption=" Video Ruang Pikir Berhasil Dirender Sempurna dengan Subtitle!" \
            "https://api.telegram.org/bot8644685615:AAERnJkiFVLR0HhFxmj5HTFmYhsmtytso1A/sendVideo?chat_id=1120755820"

      - name: Upload Hasil Video
        if: success() && github.event.action != 'telegram_publish'
        uses: actions/upload-artifact@v4
        with:
          name: video-tiktok-fakta
          path: output/
          retention-days: 7

      - name: Commit dan Push Riwayat Naskah ke Repositori
        if: success() && github.event.action != 'telegram_publish'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f naskah_history.json ]; then
            git add naskah_history.json
            git commit -m "chore: update riwayat naskah otomatis [skip ci]" || echo "Tidak ada perubahan riwayat naskah."
            git push origin main || echo "Gagal melakukan push riwayat naskah."
          else
            echo " Berkas naskah_history.json tidak ditemukan."
          fi

      - name: Kirim Notifikasi GAGAL ke Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot8644685615:AAERnJkiFVLR0HhFxmj5HTFmYhsmtytso1A/sendMessage" \
            -d "chat_id=1120755820" \
            -d "parse_mode=HTML" \
            -d "text= <b>PIPELINE GAGAL!</b>%0A%0A Bot TikTok mengalami error saat menjalankan workflow.%0A%0A🔗 Cek log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
