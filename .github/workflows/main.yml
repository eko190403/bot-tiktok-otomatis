name: Bot TikTok Auto-Pilot

on:
  # 1. Menerima ketukan pemicu dari luar (Telegram Webhook)
  repository_dispatch:
    types: [*]
    
  # 2. Mengaktifkan pemicu manual dari dasbor GitHub
  workflow_dispatch: 
  
  # 3. Mengaktifkan pemicu otomatis harian (Jam 16:00 WIB / 09:00 UTC)
  schedule:
    - cron: '0 9 * * *' 

jobs:
  # JOB 1: Mengatur otomatisasi pendaftaran Webhook Telegram secara aman di Cloud
  setup-telegram-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Daftarkan Webhook Ke Telegram API
        env:
          TELEGRAM_TOKEN: "8644685615:AAERnJkiFVLR0HhFxmj5HTFmYhsmtytso1A"
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }} # Mengambil token classic dari Secrets
        run: |
          if [ -z "$GH_PAT_TOKEN" ]; then
            echo "⚠️ GH_PAT_TOKEN belum diatur di Secrets. Melewati pendaftaran webhook."
            exit 0
          fi
          
          # Tembak API Telegram menggunakan curl resmi untuk mengunci alamat Repository Dispatch
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d '{
              "url": "https://api.github.com/repos/eko190403/bot-tiktok-otomatis/dispatches",
              "secret_token": "'"$GH_PAT_TOKEN"'"
            }'

  # JOB 2: Eksekusi rendering video V7.1 yang sudah diimunisasi
  build-and-run:
    needs: setup-telegram-webhook
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repositori
      uses: actions/checkout@v4

    - name: Bersihkan Workspace Temporer
      run: rm -rf temp/* output/*

    - name: Atur Lingkungan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instal System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        mkdir -p assets/fonts temp output

    - name: Instal Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Eksekusi Bot Utama
      env:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
        GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
        GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
        GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
      run: |
        python app.py

    - name: Unggah Hasil Video
      uses: actions/upload-artifact@v4
      with:
        name: video-tiktok-fakta
        path: output/final_output.mp4
        retention-days: 7
