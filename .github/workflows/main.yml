name: Bot TikTok Auto-Pilot

on:
  workflow_dispatch:

  repository_dispatch:
    types:
      - run-bot
      - telegram_trigger
      - webhook_trigger
      - telegram_publish

  schedule:
    # Mengkompensasi delay GitHub Actions (1-2 jam molor dari antrean server):
    # Target Pagi (07:00 WIB)   -> Cron diset 05:00 WIB (22:00 UTC)
    # Target Siang (12:00 WIB)  -> Cron diset 10:00 WIB (03:00 UTC)
    # Target Malam (19:00 WIB)  -> Cron diset 17:00 WIB (10:00 UTC)
    - cron: '0 3,10,22 * * *'
    # Cron mingguan untuk pembersihan draf lama (Senin 03:00 WIB -> 20:00 UTC)
    - cron: '0 20 * * 1'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    concurrency:
      group: bot-tiktok-pipeline
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      ENABLE_VISUAL_CTA: "false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Bersihkan Workspace
        run: |
          rm -rf temp/*
          rm -rf output/*
          mkdir -p temp output assets/fonts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg dan ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          
          # Membuka izin akses ImageMagick agar MoviePy bisa merender teks/subtitle secara universal
          sudo find /etc/ImageMagick* -name "policy.xml" -exec sed -i 's/domain="path" rights="none"/domain="path" rights="read|write"/' {} + || true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Playwright Chromium & System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Kirim Notifikasi Proses Dimulai ke Telegram
        if: github.event.action != 'telegram_publish'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=Perintah diterima! Bot mulai memproses 6 channel (Komedi Hunter, Ruang Pikir, Logika Stoik, Rahasia Finansial, Misteri Semesta, Pola Disiplin). Mohon tunggu..."

      - name: Siapkan Cookies TikTok dari Secret
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          if [ -n "$TIKTOK_COOKIES" ]; then
            echo " Menulis berkas cookies.json secara dinamis dari GitHub Secrets..."
            echo "$TIKTOK_COOKIES" > cookies.json
          else
            echo " Secret TIKTOK_COOKIES tidak diset. Menggunakan berkas cookies.json bawaan dari repositori."
          fi

      - name: Siapkan Kredensial YouTube dari Secret
        env:
          YT_CREDS_RUANGPIKIR: ${{ secrets.YT_CREDS_RUANGPIKIR }}
          YT_CREDS_LOGIKASTOIK: ${{ secrets.YT_CREDS_LOGIKASTOIK }}
          YT_CREDS_RAHASIAFINANSIAL: ${{ secrets.YT_CREDS_RAHASIAFINANSIAL }}
          YT_CREDS_MISTERISEMESTA: ${{ secrets.YT_CREDS_MISTERISEMESTA }}
          YT_CREDS_POLADISIPLIN: ${{ secrets.YT_CREDS_POLADISIPLIN }}
          YT_CREDS_KOMEDIHUNTER: ${{ secrets.YT_CREDS_KOMEDIHUNTER }}
        run: |
          echo "Menyiapkan kredensial YouTube untuk semua channel..."
          [ -n "$YT_CREDS_RUANGPIKIR" ] && echo "$YT_CREDS_RUANGPIKIR" > youtube_credentials_ruangpikir.json || echo "⚠️ Secret YT_CREDS_RUANGPIKIR belum di-set"
          [ -n "$YT_CREDS_LOGIKASTOIK" ] && echo "$YT_CREDS_LOGIKASTOIK" > youtube_credentials_logikastoik.json || echo "⚠️ Secret YT_CREDS_LOGIKASTOIK belum di-set"
          [ -n "$YT_CREDS_RAHASIAFINANSIAL" ] && echo "$YT_CREDS_RAHASIAFINANSIAL" > youtube_credentials_rahasiafinansial.json || echo "⚠️ Secret YT_CREDS_RAHASIAFINANSIAL belum di-set"
          [ -n "$YT_CREDS_MISTERISEMESTA" ] && echo "$YT_CREDS_MISTERISEMESTA" > youtube_credentials_misterisemesta.json || echo "⚠️ Secret YT_CREDS_MISTERISEMESTA belum di-set"
          [ -n "$YT_CREDS_POLADISIPLIN" ] && echo "$YT_CREDS_POLADISIPLIN" > youtube_credentials_poladisiplin.json || echo "⚠️ Secret YT_CREDS_POLADISIPLIN belum di-set"
          [ -n "$YT_CREDS_KOMEDIHUNTER" ] && echo "$YT_CREDS_KOMEDIHUNTER" > youtube_credentials_komedihunter.json || echo "⚠️ Secret YT_CREDS_KOMEDIHUNTER belum di-set"

      - name: Siapkan Akun Layanan Firebase dari Secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo " Menulis berkas firebase_service_account.json secara dinamis dari GitHub Secrets..."
            echo "$FIREBASE_SERVICE_ACCOUNT" > firebase_service_account.json
          else
            echo " Secret FIREBASE_SERVICE_ACCOUNT tidak diset. Menggunakan fallback database lokal."
          fi

      - name: Jalankan Bot
        if: github.event.action != 'telegram_publish'
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENABLE_TIKTOK_UPLOAD: "true"
          ENABLE_YOUTUBE_UPLOAD: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES1 }}
          IG_COOKIES: ${{ secrets.IG_COOKIES }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            echo "🍪 Berkas cookies.txt berhasil dibuat dari GitHub Secrets (YOUTUBE_COOKIES1)"
          fi
          
          if [ -n "$IG_COOKIES" ]; then
            echo "$IG_COOKIES" > ig_cookies.txt
            echo "🍪 Berkas ig_cookies.txt berhasil dibuat dari GitHub Secrets (IG_COOKIES)"
          fi
          
          echo "🚀 Menjalankan pipeline untuk Ruang Pikir..."
          python app.py --channel ruangpikir || echo "⚠️ Gagal di ruangpikir, lanjut ke channel berikutnya..."
          
          echo "🚀 Menjalankan pipeline untuk Logika Stoik..."
          python app.py --channel logikastoik || echo "⚠️ Gagal di logikastoik, lanjut ke channel berikutnya..."
          
          echo "🚀 Menjalankan pipeline untuk Rahasia Finansial..."
          python app.py --channel rahasiafinansial || echo "⚠️ Gagal di rahasiafinansial, lanjut ke channel berikutnya..."
          
          echo "🚀 Menjalankan pipeline untuk Misteri Semesta..."
          python app.py --channel misterisemesta || echo "⚠️ Gagal di misterisemesta, lanjut ke channel berikutnya..."
          
          echo "🚀 Menjalankan pipeline untuk Pola Disiplin..."
          python app.py --channel poladisiplin || echo "⚠️ Gagal di poladisiplin, selesai."

      - name: Jalankan Remote Control Publisher (Kirim ke Medsos)
        if: github.event.action == 'telegram_publish'
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python remote_publisher.py \
            --video_id "${{ github.event.client_payload.video_id }}" \
            --platform "${{ github.event.client_payload.platform }}" \
            --chat_id "${{ github.event.client_payload.chat_id }}"

      - name: Lihat Hasil Output
        if: always()
        run: |
          echo "Isi folder output:"
          ls -lah output || true


      - name: Upload Hasil Video
        if: success() && github.event.action != 'telegram_publish'
        uses: actions/upload-artifact@v4
        with:
          name: video-tiktok-fakta
          path: output/
          retention-days: 7

      - name: Firestore single source reminder
        if: success() && github.event.action != 'telegram_publish'
        run: |
          echo "Menggunakan Firestore sebagai single source of truth — tidak meng-commit naskah_history.json lokal."

      - name: Kirim Notifikasi GAGAL ke Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=<b>PIPELINE GAGAL!</b>%0A%0A Bot TikTok mengalami error saat menjalankan workflow.%0A%0A🔗 Cek log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
