name: Run TikTok Bot Auto-Pilot

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies Super Cepat
      run: |
        python -m pip install --upgrade pip
        pip install google-genai edge-tts moviepy numpy requests

    - name: Eksekusi Bot Utama
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      run: |
        python app.py

    # Langkah Baru: Mengunggah file video hasil render agar bisa di-download manusia
    - name: Upload Hasil Video ke GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiktok-video-hasil-render
        path: final_output.mp4
        retention-days: 1
